# ============================================================
# Code Analyzer System - Configuration
# ============================================================

# --- Database ---
db.url=jdbc:mysql://localhost:3306/code_analyzer?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
db.username=root
db.password=CHANGE_ME


# --- Gemini AI ---
gemini.api.key=CHANGE_ME
gemini.model=gemini-2.5-flash-lite
gemini.api.url=https://generativelanguage.googleapis.com/v1/models/

# --- Crawler ---
# Path to Chrome profile (for Selenium semi-auto login)
chrome.profile.path=C:/Users/YOUR_WINDOWS_USER/AppData/Local/CodeAnalyzer_Chrome
chrome.profile.dir=Default

# Delay between requests (milliseconds)
crawler.delay.ms=2000

# How often to auto-crawl (hours)
crawler.schedule.hours=24

# --- App ---
app.name=Code Analyzer System
app.version=1.0.0
